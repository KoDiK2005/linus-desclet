<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <linearGradient id="p3MaskGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d5aa8"/>
      <stop offset="55%" stop-color="#1c2c5c"/>
      <stop offset="100%" stop-color="#0a1130"/>
    </linearGradient>
    <linearGradient id="p3Gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5e08a"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
    <radialGradient id="p3Shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="80" cy="128" rx="50" ry="8" fill="url(#p3Shadow)"/>

  <g transform="rotate(-3 80 60)">
    <!-- elegant venetian silhouette: tall peak, slender swept points, pinched chin -->
    <path d="M80 22
             C98 18 114 24 124 34
             L150 10
             L130 46
             C136 62 130 78 116 84
             C104 90 94 86 87 76
             L80 96
             L73 76
             C66 86 56 90 44 84
             C30 78 24 62 30 46
             L10 10
             L36 34
             C46 24 62 18 80 22 Z"
          fill="url(#p3MaskGrad)" stroke="url(#p3Gold)" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- eye cutouts: elegant tilted almonds -->
    <path d="M87 56 Q106 38 128 42 Q110 58 87 56 Z" fill="#060a1a"/>
    <path d="M73 56 Q54 38 32 42 Q50 58 73 56 Z" fill="#060a1a"/>

    <!-- crescent moon centerpiece -->
    <path d="M80 26 a7 7 0 1 0 0.1 0 a5 5 0 1 1 -0.1 0 Z" fill="url(#p3Gold)"/>

    <!-- gold filigree swirl accent (right) -->
    <path d="M118 62 C 126 66 132 74 128 84 C 124 78 120 72 112 68" stroke="url(#p3Gold)" stroke-width="1.6" fill="none" opacity="0.9"/>
    <circle cx="129" cy="86" r="2" fill="url(#p3Gold)" opacity="0.9"/>

    <!-- thin gold sheen along top -->
    <path d="M38 30 C54 20 68 18 80 20" stroke="#ffffff" stroke-width="1.6" fill="none" opacity="0.3" stroke-linecap="round"/>
  </g>
</svg>
