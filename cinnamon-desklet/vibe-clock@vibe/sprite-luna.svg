<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 240" width="220" height="240">
  <defs>
    <radialGradient id="glowL" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#7ea8ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7ea8ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hairL" x1="0%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#5b76c9"/>
      <stop offset="45%" stop-color="#2f3d80"/>
      <stop offset="100%" stop-color="#141a3d"/>
    </linearGradient>
    <linearGradient id="hairDarkL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#26305e"/>
      <stop offset="100%" stop-color="#0e1230"/>
    </linearGradient>
    <linearGradient id="collarL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b4a8f"/>
      <stop offset="100%" stop-color="#232c5c"/>
    </linearGradient>
    <radialGradient id="skinShadeL" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="110" cy="118" rx="100" ry="118" fill="url(#glowL)"/>

  <!-- stars instead of sparkles -->
  <g fill="#cfe0ff" opacity="0.9">
    <path d="M24 66 l3 7 l7 3 l-7 3 l-3 7 l-3 -7 l-7 -3 l7 -3 Z"/>
    <circle cx="196" cy="60" r="2.4"/>
    <circle cx="30" cy="130" r="2.6"/>
    <circle cx="184" cy="110" r="1.8"/>
  </g>

  <!-- long straight back hair -->
  <path d="M44 92 C 20 130, 18 200, 34 234 C 46 220, 50 190, 48 160 C 47 138, 45 114, 44 92 Z" fill="url(#hairL)"/>
  <path d="M176 92 C 200 130, 202 200, 186 234 C 174 220, 170 190, 172 160 C 173 138, 175 114, 176 92 Z" fill="url(#hairL)"/>
  <path d="M46 100 C 34 140, 34 180, 44 214" stroke="url(#hairDarkL)" stroke-width="4" fill="none" opacity="0.5"/>
  <path d="M174 100 C 186 140, 186 180, 176 214" stroke="url(#hairDarkL)" stroke-width="4" fill="none" opacity="0.5"/>

  <!-- shoulders / hoodie collar -->
  <path d="M38 208 Q110 244 182 208 L182 240 L38 240 Z" fill="#1b2140"/>
  <path d="M72 198 Q110 218 148 198 L152 240 L68 240 Z" fill="url(#collarL)"/>
  <path d="M92 200 q18 14 36 0 l-4 10 q-14 10 -28 0 Z" fill="#141a3d"/>
  <circle cx="94" cy="214" r="2.4" fill="#8fa3e0"/>
  <circle cx="126" cy="214" r="2.4" fill="#8fa3e0"/>

  <!-- neck -->
  <path d="M94 178 L126 178 L124 202 Q110 210 96 202 Z" fill="#ffe3ef"/>

  <!-- head -->
  <circle cx="110" cy="118" r="64" fill="#ffe3ef"/>
  <ellipse cx="110" cy="100" rx="60" ry="50" fill="url(#skinShadeL)"/>

  <!-- cat-ear headband -->
  <path d="M62 66 L50 30 L84 54 Z" fill="url(#hairL)"/>
  <path d="M66 60 L58 38 L78 52 Z" fill="#ffb8d6" opacity="0.8"/>
  <path d="M158 66 L170 30 L136 54 Z" fill="url(#hairL)"/>
  <path d="M154 60 L162 38 L142 52 Z" fill="#ffb8d6" opacity="0.8"/>

  <!-- ears blush -->
  <circle cx="76" cy="128" r="10" fill="#ff9bd0" opacity="0.45"/>
  <circle cx="144" cy="128" r="10" fill="#ff9bd0" opacity="0.45"/>

  <!-- eyebrows -->
  <path d="M70 92 Q82 86 94 90" stroke="#2a3363" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M126 90 Q138 86 150 92" stroke="#2a3363" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- sleepy / calm closed eyes -->
  <path d="M68 106 Q82 116 96 106" stroke="#1b2a52" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M68 106 q2 5 6 7" stroke="#1b2a52" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M124 106 Q138 116 152 106" stroke="#1b2a52" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M152 106 q-2 5 -6 7" stroke="#1b2a52" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M74 100 q8 -6 16 -1" stroke="#5b76c9" stroke-width="1.6" fill="none" opacity="0.5"/>
  <path d="M130 99 q8 -5 16 0" stroke="#5b76c9" stroke-width="1.6" fill="none" opacity="0.5"/>

  <!-- nose + serene smile -->
  <path d="M110 122 q2 4 -1 7" stroke="#e8a9c4" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M102 136 Q110 140 118 136" stroke="#d9548f" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- blush -->
  <ellipse cx="78" cy="130" rx="9" ry="5" fill="#ff9bd0" opacity="0.4"/>
  <ellipse cx="142" cy="130" rx="9" ry="5" fill="#ff9bd0" opacity="0.4"/>

  <!-- front hair / straight bangs -->
  <path d="M46 100 C 40 52 72 20 110 20 C 148 20 180 52 174 100
           C 164 76 150 92 138 78 C 128 92 116 74 110 84
           C 104 74 92 92 82 78 C 70 92 56 76 46 100 Z" fill="url(#hairL)"/>
  <path d="M46 100 C 34 118 32 144 42 162 C 46 138 50 118 58 104 Z" fill="url(#hairL)"/>
  <path d="M174 100 C 186 118 188 144 178 162 C 174 138 170 118 162 104 Z" fill="url(#hairL)"/>
  <path d="M58 40 C 74 22 96 16 110 17" stroke="#ffffff" stroke-width="2.5" fill="none" opacity="0.3" stroke-linecap="round"/>

  <!-- moon hairpin -->
  <path d="M144 58 a7 7 0 1 0 0.1 0 a5 5 0 1 1 -0.1 0 Z" fill="#cfe0ff"/>
</svg>
