<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 240" width="220" height="240">
  <defs>
    <radialGradient id="glowR" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#4fe0c9" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#4fe0c9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hairR" x1="0%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#5be0c8"/>
      <stop offset="45%" stop-color="#1fae94"/>
      <stop offset="100%" stop-color="#0e6b5c"/>
    </linearGradient>
    <radialGradient id="irisR" cx="42%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffd88a"/>
      <stop offset="55%" stop-color="#e0972f"/>
      <stop offset="100%" stop-color="#7a4a12"/>
    </radialGradient>
    <linearGradient id="hoodieR" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1f2733"/>
    </linearGradient>
    <radialGradient id="skinShadeR" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="110" cy="118" rx="100" ry="118" fill="url(#glowR)"/>

  <g fill="#d7fff5" opacity="0.9">
    <path d="M26 66 l3 7 l7 3 l-7 3 l-3 7 l-3 -7 l-7 -3 l7 -3 Z"/>
    <circle cx="192" cy="58" r="2.6"/>
    <circle cx="30" cy="128" r="2.4"/>
  </g>

  <!-- short back hair tufts -->
  <path d="M48 100 C 34 108 26 122 30 138 C 40 128 46 116 52 106 Z" fill="url(#hairR)"/>
  <path d="M172 100 C 186 108 194 122 190 138 C 180 128 174 116 168 106 Z" fill="url(#hairR)"/>

  <!-- shoulders / hoodie -->
  <path d="M36 206 Q110 244 184 206 L184 240 L36 240 Z" fill="url(#hoodieR)"/>
  <path d="M92 202 L110 240 L128 202" fill="none" stroke="#0d1117" stroke-width="3"/>
  <circle cx="110" cy="210" r="2.2" fill="#5be0c8"/>
  <circle cx="110" cy="222" r="2.2" fill="#5be0c8"/>
  <circle cx="110" cy="234" r="2.2" fill="#5be0c8"/>
  <path d="M70 198 Q110 216 150 198 L150 208 Q110 226 70 208 Z" fill="#101820"/>

  <!-- headphones around neck -->
  <path d="M74 196 Q110 224 146 196" stroke="#20262e" stroke-width="8" fill="none" stroke-linecap="round"/>
  <circle cx="72" cy="198" r="10" fill="#282f38" stroke="#5be0c8" stroke-width="2"/>
  <circle cx="148" cy="198" r="10" fill="#282f38" stroke="#5be0c8" stroke-width="2"/>

  <!-- neck -->
  <path d="M94 178 L126 178 L124 202 Q110 210 96 202 Z" fill="#ffe3c9"/>

  <!-- head -->
  <circle cx="110" cy="118" r="64" fill="#ffe3c9"/>
  <ellipse cx="110" cy="100" rx="60" ry="50" fill="url(#skinShadeR)"/>

  <!-- ears blush -->
  <circle cx="76" cy="128" r="9" fill="#ff9d6b" opacity="0.35"/>
  <circle cx="144" cy="128" r="9" fill="#ff9d6b" opacity="0.35"/>

  <!-- eyebrows: one raised for attitude -->
  <path d="M68 86 Q82 76 96 86" stroke="#0e4a3d" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M126 90 Q138 86 150 92" stroke="#0e4a3d" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- confident half-lidded eyes -->
  <g>
    <path d="M66 110 Q72 100 92 102 Q104 104 101 116 Q92 126 76 122 Q66 119 66 110 Z" fill="url(#irisR)"/>
    <path d="M64 108 Q70 96 94 100" stroke="#12352c" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M66 110 Q80 108 100 111" stroke="#12352c" stroke-width="3" fill="none" opacity="0.85"/>
    <ellipse cx="90" cy="109" rx="6" ry="7.5" fill="#12352c"/>
    <circle cx="87" cy="105" r="3.6" fill="#ffffff"/>
  </g>
  <g>
    <path d="M154 110 Q148 100 128 102 Q116 104 119 116 Q128 126 144 122 Q154 119 154 110 Z" fill="url(#irisR)"/>
    <path d="M156 108 Q150 96 126 100" stroke="#12352c" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M154 110 Q140 108 120 111" stroke="#12352c" stroke-width="3" fill="none" opacity="0.85"/>
    <ellipse cx="130" cy="109" rx="6" ry="7.5" fill="#12352c"/>
    <circle cx="127" cy="105" r="3.6" fill="#ffffff"/>
  </g>

  <!-- nose + smirk -->
  <path d="M110 122 q2 4 -1 7" stroke="#e0a479" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M100 135 Q110 140 120 132" stroke="#a8562f" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <path d="M114 138 q4 -1 7 -5" stroke="#a8562f" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- spiky front bangs -->
  <path d="M46 96 L52 64 L66 84 L76 56 L92 82 L108 52 L124 82 L140 56 L150 84 L164 64 L174 96
           C 160 82 146 90 134 80 C 124 92 114 78 108 86
           C 100 78 90 92 80 80 C 70 90 58 82 46 96 Z" fill="url(#hairR)"/>
  <path d="M60 58 C 74 44 92 38 108 38" stroke="#ffffff" stroke-width="2.5" fill="none" opacity="0.35" stroke-linecap="round"/>
</svg>
