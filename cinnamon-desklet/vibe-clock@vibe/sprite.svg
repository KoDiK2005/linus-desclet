<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 240" width="220" height="240">
  <defs>
    <radialGradient id="glow" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#ff9be0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff9be0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hair" x1="0%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#e2b8ff"/>
      <stop offset="45%" stop-color="#b070f5"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="hairDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9747e8"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <radialGradient id="iris" cx="42%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#c9a3ff"/>
      <stop offset="55%" stop-color="#9251e0"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <linearGradient id="collar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffd9ef"/>
    </linearGradient>
    <radialGradient id="skinShade" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="110" cy="118" rx="100" ry="118" fill="url(#glow)"/>

  <!-- sparkles -->
  <g fill="#ffe6f7" opacity="0.9">
    <path d="M22 70 l4 10 l10 4 l-10 4 l-4 10 l-4 -10 l-10 -4 l10 -4 Z"/>
    <path d="M196 52 l3 7 l7 3 l-7 3 l-3 7 l-3 -7 l-7 -3 l7 -3 Z"/>
    <circle cx="30" cy="130" r="3"/>
  </g>

  <!-- back hair / twin tails flowing down -->
  <path d="M46 96 C 4 118, -6 190, 16 232 C 34 224, 44 206, 46 178 C 48 150, 44 122, 46 96 Z" fill="url(#hair)"/>
  <path d="M174 96 C 216 118, 226 190, 204 232 C 186 224, 176 206, 174 178 C 172 150, 176 122, 174 96 Z" fill="url(#hair)"/>
  <path d="M46 96 C 20 112, 10 150, 18 190" stroke="url(#hairDark)" stroke-width="4" fill="none" opacity="0.5"/>
  <path d="M174 96 C 200 112, 210 150, 202 190" stroke="url(#hairDark)" stroke-width="4" fill="none" opacity="0.5"/>

  <!-- shoulders / collar -->
  <path d="M40 210 Q110 246 180 210 L180 240 L40 240 Z" fill="#5b21b6"/>
  <path d="M70 196 L110 224 L150 196 L150 240 L70 240 Z" fill="url(#collar)"/>
  <path d="M104 210 l6 10 l6 -10 l-3 16 h-6 Z" fill="#ff4fb8"/>

  <!-- neck -->
  <path d="M94 178 L126 178 L124 202 Q110 210 96 202 Z" fill="#ffe3ef"/>

  <!-- head -->
  <circle cx="110" cy="118" r="64" fill="#ffe3ef"/>
  <ellipse cx="110" cy="100" rx="60" ry="50" fill="url(#skinShade)"/>

  <!-- ears blush -->
  <circle cx="76" cy="128" r="10" fill="#ff9bd0" opacity="0.55"/>
  <circle cx="144" cy="128" r="10" fill="#ff9bd0" opacity="0.55"/>

  <!-- eyebrows -->
  <path d="M70 90 Q82 82 94 88" stroke="#5b21b6" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M126 88 Q138 82 150 90" stroke="#5b21b6" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- eyes: left -->
  <g>
    <path d="M66 108 Q72 94 92 97 Q104 100 101 116 Q92 130 76 126 Q66 122 66 108 Z" fill="url(#iris)"/>
    <path d="M64 106 Q70 90 94 94" stroke="#2e1065" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M62 108 q-4 4 -2 9" stroke="#2e1065" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="90" cy="105" rx="6.5" ry="9" fill="#2e1065"/>
    <circle cx="87" cy="100" r="4.2" fill="#ffffff"/>
    <circle cx="96" cy="114" r="2.2" fill="#ffffff" opacity="0.9"/>
    <circle cx="80" cy="118" r="1.6" fill="#ffffff" opacity="0.7"/>
  </g>

  <!-- eyes: right -->
  <g>
    <path d="M154 108 Q148 94 128 97 Q116 100 119 116 Q128 130 144 126 Q154 122 154 108 Z" fill="url(#iris)"/>
    <path d="M156 106 Q150 90 126 94" stroke="#2e1065" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M158 108 q4 4 2 9" stroke="#2e1065" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="130" cy="105" rx="6.5" ry="9" fill="#2e1065"/>
    <circle cx="127" cy="100" r="4.2" fill="#ffffff"/>
    <circle cx="136" cy="114" r="2.2" fill="#ffffff" opacity="0.9"/>
    <circle cx="120" cy="118" r="1.6" fill="#ffffff" opacity="0.7"/>
  </g>

  <!-- nose + mouth -->
  <path d="M110 122 q2 4 -1 7" stroke="#e8a9c4" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M100 136 Q110 144 120 136" stroke="#d9548f" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <path d="M104 138 Q110 141 116 138" stroke="#ff88b8" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round"/>

  <!-- blush -->
  <ellipse cx="78" cy="132" rx="10" ry="6" fill="#ff9bd0" opacity="0.5"/>
  <ellipse cx="142" cy="132" rx="10" ry="6" fill="#ff9bd0" opacity="0.5"/>

  <!-- front hair / bangs -->
  <path d="M46 100 C 40 52 72 20 110 20 C 148 20 180 52 174 100
           C 164 76 150 92 138 78 C 128 92 116 74 110 84
           C 104 74 92 92 82 78 C 70 92 56 76 46 100 Z" fill="url(#hair)"/>
  <path d="M46 100 C 34 118 32 144 42 162 C 46 138 50 118 58 104 Z" fill="url(#hair)"/>
  <path d="M174 100 C 186 118 188 144 178 162 C 174 138 170 118 162 104 Z" fill="url(#hair)"/>
  <path d="M58 40 C 74 22 96 16 110 17" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.4" stroke-linecap="round"/>
  <!-- ahoge -->
  <path d="M108 20 C 104 6 116 2 122 10 C 116 10 112 14 112 22 Z" fill="url(#hair)"/>

  <!-- hair clip -->
  <path d="M140 62 l13 -9 l-2 11 l9 5 l-13 4 l2 11 l-13 -11 Z" fill="#ff2fb0"/>
  <circle cx="140" cy="66" r="3.6" fill="#ffd1ec"/>
</svg>
