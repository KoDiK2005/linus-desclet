<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <linearGradient id="maskGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e2e33"/>
      <stop offset="55%" stop-color="#151517"/>
      <stop offset="100%" stop-color="#050506"/>
    </linearGradient>
    <linearGradient id="redEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#a80d0d"/>
    </linearGradient>
    <radialGradient id="p5MaskShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="80" cy="128" rx="50" ry="8" fill="url(#p5MaskShadow)"/>

  <g transform="rotate(-3 80 60)">
    <!-- outer silhouette: peaked crown, swept wing points, pinched chin -->
    <path d="M80 26
             C100 22 118 26 128 34
             L156 14
             L134 44
             C140 60 136 76 120 82
             C108 90 96 86 88 74
             L80 94
             L72 74
             C64 86 52 90 40 82
             C24 76 20 60 26 44
             L4 14
             L32 34
             C42 26 60 22 80 26 Z"
          fill="url(#maskGrad)" stroke="url(#redEdge)" stroke-width="2" stroke-linejoin="round"/>

    <!-- eye cutouts: sharp tilted cat-eye almonds -->
    <path d="M88 56 Q108 36 130 42 Q112 58 88 56 Z" fill="#000000"/>
    <path d="M72 56 Q52 36 30 42 Q48 58 72 56 Z" fill="#000000"/>

    <!-- center rivet -->
    <circle cx="80" cy="30" r="3" fill="url(#redEdge)"/>

    <!-- thin sheen along top -->
    <path d="M36 30 C52 22 66 20 80 22" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round"/>
  </g>
</svg>
