<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 240" width="220" height="240">
  <defs>
    <radialGradient id="glowY" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#a9f2ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a9f2ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hairY" x1="0%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#f4faff"/>
      <stop offset="45%" stop-color="#bfe4f2"/>
      <stop offset="100%" stop-color="#7fb8d1"/>
    </linearGradient>
    <linearGradient id="irisY" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9be9ff"/>
      <stop offset="60%" stop-color="#33b5e0"/>
      <stop offset="100%" stop-color="#1a5f80"/>
    </linearGradient>
    <linearGradient id="collarY" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5ec9e8"/>
      <stop offset="100%" stop-color="#2f8fae"/>
    </linearGradient>
    <radialGradient id="skinShadeY" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="110" cy="118" rx="100" ry="118" fill="url(#glowY)"/>

  <g fill="#eafcff" opacity="0.9">
    <path d="M24 68 l4 9 l9 4 l-9 4 l-4 9 l-4 -9 l-9 -4 l9 -4 Z"/>
    <path d="M194 54 l3 6 l6 3 l-6 3 l-3 6 l-3 -6 l-6 -3 l6 -3 Z"/>
    <circle cx="32" cy="132" r="2.6"/>
  </g>

  <!-- side ponytail -->
  <path d="M158 84 C 190 92, 210 130, 196 176 C 186 168, 176 148, 172 126 C 168 108, 162 96, 158 84 Z" fill="url(#hairY)"/>
  <path d="M164 90 C 182 104, 192 130, 184 160" stroke="#9fcfe3" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M46 100 C 34 112, 30 130, 36 148 C 42 132, 46 116, 52 104 Z" fill="url(#hairY)"/>
  <path d="M174 100 C 182 110, 184 122, 180 134 C 176 122, 174 110, 170 102 Z" fill="url(#hairY)"/>

  <!-- shoulders / hoodie collar -->
  <path d="M38 208 Q110 244 182 208 L182 240 L38 240 Z" fill="#1c5a70"/>
  <path d="M72 198 Q110 218 148 198 L152 240 L68 240 Z" fill="url(#collarY)"/>
  <path d="M92 200 q18 14 36 0 l-4 10 q-14 10 -28 0 Z" fill="#134a5c"/>
  <circle cx="94" cy="214" r="2.4" fill="#bdeeff"/>
  <circle cx="126" cy="214" r="2.4" fill="#bdeeff"/>

  <!-- neck -->
  <path d="M94 178 L126 178 L124 202 Q110 210 96 202 Z" fill="#ffe3ef"/>

  <!-- head -->
  <circle cx="110" cy="118" r="64" fill="#ffe3ef"/>
  <ellipse cx="110" cy="100" rx="60" ry="50" fill="url(#skinShadeY)"/>

  <!-- ears blush -->
  <circle cx="76" cy="128" r="10" fill="#ff9bd0" opacity="0.4"/>
  <circle cx="144" cy="128" r="10" fill="#ff9bd0" opacity="0.4"/>

  <!-- eyebrows -->
  <path d="M70 90 Q82 82 96 88" stroke="#2f6f85" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M124 88 Q138 82 150 90" stroke="#2f6f85" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- eyes -->
  <g>
    <path d="M66 108 Q72 94 92 97 Q104 100 101 116 Q92 130 76 126 Q66 122 66 108 Z" fill="url(#irisY)"/>
    <path d="M64 106 Q70 90 94 94" stroke="#123a4a" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="90" cy="105" rx="6.5" ry="9" fill="#123a4a"/>
    <circle cx="87" cy="100" r="4.2" fill="#ffffff"/>
    <circle cx="96" cy="114" r="2.2" fill="#ffffff" opacity="0.9"/>
  </g>
  <g>
    <path d="M154 108 Q148 94 128 97 Q116 100 119 116 Q128 130 144 126 Q154 122 154 108 Z" fill="url(#irisY)"/>
    <path d="M156 106 Q150 90 126 94" stroke="#123a4a" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="130" cy="105" rx="6.5" ry="9" fill="#123a4a"/>
    <circle cx="127" cy="100" r="4.2" fill="#ffffff"/>
    <circle cx="136" cy="114" r="2.2" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- round glasses -->
  <circle cx="83" cy="107" r="20" fill="none" stroke="#2f6f85" stroke-width="2.5" opacity="0.85"/>
  <circle cx="137" cy="107" r="20" fill="none" stroke="#2f6f85" stroke-width="2.5" opacity="0.85"/>
  <path d="M103 105 Q110 100 117 105" stroke="#2f6f85" stroke-width="2.5" fill="none" opacity="0.85"/>
  <path d="M63 100 L52 96" stroke="#2f6f85" stroke-width="2.5" opacity="0.85"/>
  <path d="M157 100 L168 96" stroke="#2f6f85" stroke-width="2.5" opacity="0.85"/>

  <!-- nose + smirk -->
  <path d="M110 122 q2 4 -1 7" stroke="#e8a9c4" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M100 137 Q112 144 122 132" stroke="#2f6f85" stroke-width="2.4" fill="none" stroke-linecap="round"/>

  <!-- blush -->
  <ellipse cx="78" cy="132" rx="9" ry="5" fill="#ff9bd0" opacity="0.4"/>
  <ellipse cx="142" cy="132" rx="9" ry="5" fill="#ff9bd0" opacity="0.4"/>

  <!-- front hair / bangs with side sweep -->
  <path d="M46 100 C 40 52 72 20 108 20 C 144 20 178 48 176 92
           C 162 74 148 88 136 76 C 126 90 114 74 106 84
           C 98 76 88 90 78 78 C 68 90 56 76 46 100 Z" fill="url(#hairY)"/>
  <path d="M46 100 C 34 118 32 144 42 162 C 46 138 50 118 58 104 Z" fill="url(#hairY)"/>
  <path d="M58 40 C 74 22 96 16 108 17" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.4" stroke-linecap="round"/>

  <!-- star hair clip -->
  <path d="M60 66 l3 7 l7 3 l-7 3 l-3 7 l-3 -7 l-7 -3 l7 -3 Z" fill="#33b5e0"/>
</svg>
