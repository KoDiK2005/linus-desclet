<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 220" width="440" height="220">
  <defs>
    <linearGradient id="p3Bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141b3c"/>
      <stop offset="100%" stop-color="#050814"/>
    </linearGradient>
    <linearGradient id="p3GoldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5e08a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f5e08a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f5e08a" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5e08a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f5e08a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="p3Vignette" cx="50%" cy="45%" r="75%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </radialGradient>
    <clipPath id="p3Frame">
      <rect x="0" y="0" width="440" height="220" rx="4"/>
    </clipPath>
  </defs>

  <g clip-path="url(#p3Frame)">
    <rect x="0" y="0" width="440" height="220" fill="url(#p3Bg)"/>

    <!-- moon -->
    <circle cx="378" cy="46" r="46" fill="url(#moonGlow)"/>
    <circle cx="378" cy="46" r="22" fill="#f5e08a" opacity="0.85"/>
    <circle cx="388" cy="40" r="20" fill="#050814" opacity="0.9"/>

    <!-- stars -->
    <g fill="#f5e08a" opacity="0.8">
      <circle cx="40" cy="30" r="1.4"/>
      <circle cx="70" cy="55" r="1"/>
      <circle cx="20" cy="80" r="1.2"/>
      <circle cx="120" cy="24" r="1"/>
      <circle cx="300" cy="150" r="1.2"/>
      <circle cx="260" cy="190" r="1"/>
    </g>

    <!-- thin gold art-deco frame lines -->
    <path d="M18 18 L120 18 L136 34" stroke="url(#p3GoldLine)" stroke-width="1.5" fill="none"/>
    <path d="M422 202 L320 202 L304 186" stroke="url(#p3GoldLine)" stroke-width="1.5" fill="none"/>
    <path d="M18 202 L60 202 L60 178" stroke="#f5e08a" stroke-width="1.2" fill="none" opacity="0.6"/>
    <path d="M422 18 L380 18 L380 42" stroke="#f5e08a" stroke-width="1.2" fill="none" opacity="0.6"/>

    <!-- diagonal elegant accent -->
    <path d="M-20 170 L140 30" stroke="#f5e08a" stroke-width="1" opacity="0.25"/>
    <path d="M300 240 L440 120" stroke="#f5e08a" stroke-width="1" opacity="0.25"/>

    <rect x="0" y="0" width="440" height="220" fill="url(#p3Vignette)"/>
  </g>

  <rect x="2" y="2" width="436" height="216" rx="4" fill="none" stroke="#c9a227" stroke-width="2"/>
</svg>
