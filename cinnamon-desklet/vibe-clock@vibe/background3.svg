<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 220" width="440" height="220">
  <defs>
    <linearGradient id="p3Bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#161f45"/>
      <stop offset="100%" stop-color="#050814"/>
    </linearGradient>
    <linearGradient id="p3GoldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5e08a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f5e08a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f5e08a" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5e08a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f5e08a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="p3Vignette" cx="50%" cy="45%" r="75%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </radialGradient>
    <linearGradient id="p3Card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5e08a" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#f5e08a" stop-opacity="0.03"/>
    </linearGradient>
    <clipPath id="p3Frame">
      <rect x="0" y="0" width="440" height="220" rx="4"/>
    </clipPath>
  </defs>

  <g clip-path="url(#p3Frame)">
    <rect x="0" y="0" width="440" height="220" fill="url(#p3Bg)"/>

    <!-- moonlight rays -->
    <g stroke="#f5e08a" stroke-width="1" opacity="0.08">
      <line x1="378" y1="46" x2="60" y2="220"/>
      <line x1="378" y1="46" x2="180" y2="220"/>
      <line x1="378" y1="46" x2="300" y2="220"/>
      <line x1="378" y1="46" x2="420" y2="220"/>
    </g>

    <!-- tarot card watermark -->
    <rect x="272" y="60" width="120" height="180" rx="10" fill="url(#p3Card)" stroke="#f5e08a" stroke-width="1" stroke-opacity="0.12" transform="rotate(8 332 150)"/>
    <circle cx="332" cy="130" r="18" fill="none" stroke="#f5e08a" stroke-width="1" stroke-opacity="0.15" transform="rotate(8 332 150)"/>

    <!-- moon -->
    <circle cx="378" cy="46" r="50" fill="url(#moonGlow)"/>
    <circle cx="378" cy="46" r="23" fill="#f5e08a" opacity="0.9"/>
    <circle cx="389" cy="39" r="21" fill="#0a0e24" opacity="0.95"/>

    <!-- stars -->
    <g fill="#f5e08a" opacity="0.85">
      <circle cx="40" cy="30" r="1.6"/>
      <circle cx="70" cy="55" r="1"/>
      <circle cx="20" cy="80" r="1.3"/>
      <circle cx="120" cy="24" r="1"/>
      <circle cx="300" cy="150" r="1.3"/>
      <circle cx="260" cy="190" r="1"/>
      <circle cx="150" cy="70" r="1.1"/>
      <circle cx="95" cy="115" r="0.9"/>
      <circle cx="230" cy="40" r="1"/>
    </g>
    <g fill="#ffffff" opacity="0.5">
      <path d="M40 30 l1.6 0 M40.8 29.2 l0 1.6" stroke="#ffffff" stroke-width="0.6"/>
      <path d="M120 24 l1.6 0 M120.8 23.2 l0 1.6" stroke="#ffffff" stroke-width="0.6"/>
    </g>

    <!-- art-deco frame with diamond studs -->
    <path d="M18 18 L120 18 L136 34" stroke="url(#p3GoldLine)" stroke-width="1.5" fill="none"/>
    <path d="M422 202 L320 202 L304 186" stroke="url(#p3GoldLine)" stroke-width="1.5" fill="none"/>
    <path d="M18 202 L60 202 L60 178" stroke="#f5e08a" stroke-width="1.2" fill="none" opacity="0.6"/>
    <path d="M422 18 L380 18 L380 42" stroke="#f5e08a" stroke-width="1.2" fill="none" opacity="0.6"/>
    <g fill="#f5e08a" opacity="0.7">
      <path d="M18 18 l4 -4 l4 4 l-4 4 Z"/>
      <path d="M422 202 l4 -4 l4 4 l-4 4 Z"/>
    </g>

    <!-- diagonal elegant accent -->
    <path d="M-20 170 L140 30" stroke="#f5e08a" stroke-width="1" opacity="0.2"/>
    <path d="M300 240 L440 120" stroke="#f5e08a" stroke-width="1" opacity="0.2"/>

    <rect x="0" y="0" width="440" height="220" fill="url(#p3Vignette)"/>
  </g>

  <rect x="2" y="2" width="436" height="216" rx="4" fill="none" stroke="#c9a227" stroke-width="2"/>
</svg>
