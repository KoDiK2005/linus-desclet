  <path d="M178 100 C 196 118, 200 160, 190 200 C 180 194, 174 178, 174 160 C 174 178 168 190 160 196
           C 170 170 174 130 178 100 Z" fill="url(#hairMo)"/>
  <g stroke="#8a5a2e" stroke-width="2.4" opacity="0.6">
