  <g fill="#c98a52" opacity="0.6">
    <circle cx="72" cy="118" r="1.4"/>
    <circle cx="78" cy="122" r="1.4"/>
    <circle cx="84" cy="117" r="1.4"/>
    <circle cx="136" cy="117" r="1.4"/>
