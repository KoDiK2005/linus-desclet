  <path d="M174 100 C 186 118 188 144 178 162 C 174 138 170 118 162 104 Z" fill="url(#hairMo)"/>
  <path d="M58 40 C 74 22 96 16 110 17" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.35" stroke-linecap="round"/>

  <!-- beret -->
  <ellipse cx="106" cy="24" rx="34" ry="18" fill="#c9432f"/>
  <ellipse cx="106" cy="20" rx="34" ry="16" fill="#e0473a"/>
  <circle cx="132" cy="10" r="4" fill="#8a2116"/>
