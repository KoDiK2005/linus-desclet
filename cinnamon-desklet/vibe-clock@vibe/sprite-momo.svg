    <radialGradient id="skinShadeMo" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="110" cy="118" rx="100" ry="118" fill="url(#glowMo)"/>

  <g fill="#fff3e2" opacity="0.9">
    <path d="M24 68 l4 9 l9 4 l-9 4 l-4 9 l-4 -9 l-9 -4 l9 -4 Z"/>
