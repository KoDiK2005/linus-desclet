<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 240" width="220" height="240">
  <defs>
    <radialGradient id="glowMo" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#ffcf8a" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffcf8a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hairMo" x1="0%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#e8b98a"/>
      <stop offset="45%" stop-color="#c08a52"/>
      <stop offset="100%" stop-color="#8a5a2e"/>
    </linearGradient>
    <radialGradient id="irisMo" cx="42%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffd9a3"/>
      <stop offset="55%" stop-color="#c47f3a"/>
      <stop offset="100%" stop-color="#6b3d16"/>
    </radialGradient>
    <linearGradient id="sweaterMo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0a35c"/>
      <stop offset="100%" stop-color="#c97a34"/>
