  <path d="M70 90 Q82 83 94 89" stroke="#6b3d16" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M126 89 Q138 83 150 90" stroke="#6b3d16" stroke-width="3" fill="none" stroke-linecap="round"/>

