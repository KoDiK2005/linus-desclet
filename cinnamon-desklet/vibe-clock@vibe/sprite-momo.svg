  <path d="M101 136 Q110 142 119 136" stroke="#a8562f" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- blush -->
  <ellipse cx="78" cy="130" rx="9" ry="5" fill="#ff9d6b" opacity="0.4"/>
  <ellipse cx="142" cy="130" rx="9" ry="5" fill="#ff9d6b" opacity="0.4"/>

