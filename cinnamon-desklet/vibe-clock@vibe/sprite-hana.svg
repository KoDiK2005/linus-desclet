<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 240" width="220" height="240">
  <defs>
    <radialGradient id="glowH" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#ff8fb0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff8fb0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hairH" x1="0%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#ffc2dd"/>
      <stop offset="45%" stop-color="#ff8fc0"/>
      <stop offset="100%" stop-color="#e1508f"/>
    </linearGradient>
    <radialGradient id="irisH" cx="42%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#c8ffcf"/>
      <stop offset="55%" stop-color="#4fbf6e"/>
      <stop offset="100%" stop-color="#1f7a3a"/>
    </radialGradient>
    <linearGradient id="dressH" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff3f8"/>
      <stop offset="100%" stop-color="#ffd6e8"/>
    </linearGradient>
    <radialGradient id="skinShadeH" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="110" cy="118" rx="100" ry="118" fill="url(#glowH)"/>

  <g fill="#fff0f6" opacity="0.9">
    <path d="M24 68 l4 9 l9 4 l-9 4 l-4 9 l-4 -9 l-9 -4 l9 -4 Z"/>
    <path d="M194 54 l3 6 l6 3 l-6 3 l-3 6 l-3 -6 l-6 -3 l6 -3 Z"/>
    <circle cx="32" cy="130" r="2.6"/>
  </g>

  <!-- wavy back hair -->
  <path d="M44 96 C 14 116, 4 170, 22 214 C 38 202, 46 180, 46 158
           C 46 172, 54 184, 66 190 C 56 168, 52 128, 44 96 Z" fill="url(#hairH)"/>
  <path d="M176 96 C 206 116, 216 170, 198 214 C 182 202, 174 180, 174 158
           C 174 172, 166 184, 154 190 C 164 168, 168 128, 176 96 Z" fill="url(#hairH)"/>

  <!-- shoulders / sundress -->
  <path d="M38 208 Q110 244 182 208 L182 240 L38 240 Z" fill="#e1508f"/>
  <path d="M66 198 Q110 220 154 198 L158 240 L62 240 Z" fill="url(#dressH)"/>
  <path d="M80 200 L84 226 M140 200 L136 226" stroke="#ff8fc0" stroke-width="4" stroke-linecap="round"/>
  <circle cx="110" cy="214" r="4" fill="#ff8fc0"/>

  <!-- neck -->
  <path d="M94 178 L126 178 L124 202 Q110 210 96 202 Z" fill="#ffe3ef"/>

  <!-- head -->
  <circle cx="110" cy="118" r="64" fill="#ffe3ef"/>
  <ellipse cx="110" cy="100" rx="60" ry="50" fill="url(#skinShadeH)"/>

  <!-- ears blush -->
  <circle cx="76" cy="128" r="10" fill="#ff9bd0" opacity="0.5"/>
  <circle cx="144" cy="128" r="10" fill="#ff9bd0" opacity="0.5"/>

  <!-- eyebrows -->
  <path d="M70 90 Q82 82 94 88" stroke="#a83e6c" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M126 88 Q138 82 150 90" stroke="#a83e6c" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- big cheerful eyes -->
  <g>
    <path d="M65 108 Q71 92 92 96 Q105 99 102 117 Q92 132 75 128 Q65 123 65 108 Z" fill="url(#irisH)"/>
    <path d="M63 106 Q69 88 94 93" stroke="#1c4a2a" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="90" cy="106" rx="7" ry="9.5" fill="#1c4a2a"/>
    <circle cx="87" cy="100" r="4.4" fill="#ffffff"/>
    <circle cx="97" cy="115" r="2.4" fill="#ffffff" opacity="0.9"/>
  </g>
  <g>
    <path d="M155 108 Q149 92 128 96 Q115 99 118 117 Q128 132 145 128 Q155 123 155 108 Z" fill="url(#irisH)"/>
    <path d="M157 106 Q151 88 126 93" stroke="#1c4a2a" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="130" cy="106" rx="7" ry="9.5" fill="#1c4a2a"/>
    <circle cx="127" cy="100" r="4.4" fill="#ffffff"/>
    <circle cx="137" cy="115" r="2.4" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- nose + big open smile -->
  <path d="M110 122 q2 4 -1 7" stroke="#e8a9c4" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M96 135 Q110 152 124 135 Q110 148 96 135 Z" fill="#c9436f"/>
  <path d="M100 137 Q110 144 120 137" fill="#ffffff"/>

  <!-- blush -->
  <ellipse cx="78" cy="132" rx="11" ry="6.5" fill="#ff9bd0" opacity="0.55"/>
  <ellipse cx="142" cy="132" rx="11" ry="6.5" fill="#ff9bd0" opacity="0.55"/>

  <!-- front hair / bangs -->
  <path d="M46 100 C 40 52 72 20 110 20 C 148 20 180 52 174 100
           C 164 76 150 92 138 78 C 128 92 116 74 110 84
           C 104 74 92 92 82 78 C 70 92 56 76 46 100 Z" fill="url(#hairH)"/>
  <path d="M46 100 C 34 118 32 144 42 162 C 46 138 50 118 58 104 Z" fill="url(#hairH)"/>
  <path d="M174 100 C 186 118 188 144 178 162 C 174 138 170 118 162 104 Z" fill="url(#hairH)"/>
  <path d="M58 40 C 74 22 96 16 110 17" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.4" stroke-linecap="round"/>

  <!-- flower crown -->
  <g fill="#ff8fc0">
    <circle cx="70" cy="46" r="6"/>
    <circle cx="88" cy="34" r="6"/>
    <circle cx="108" cy="28" r="6"/>
    <circle cx="128" cy="34" r="6"/>
    <circle cx="146" cy="46" r="6"/>
  </g>
  <g fill="#ffe37a">
    <circle cx="70" cy="46" r="2.4"/>
    <circle cx="88" cy="34" r="2.4"/>
    <circle cx="108" cy="28" r="2.4"/>
    <circle cx="128" cy="34" r="2.4"/>
    <circle cx="146" cy="46" r="2.4"/>
  </g>

  <!-- odango buns -->
  <circle cx="60" cy="30" r="14" fill="url(#hairH)"/>
  <circle cx="160" cy="30" r="14" fill="url(#hairH)"/>
</svg>
